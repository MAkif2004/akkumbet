<!DOCTYPE html>
<html lang="nl">
<head>
  <meta charset="UTF-8" />
  <title>Supabase CRUD demo</title>
  <script type="module" src="./admin.js"></script>
  <script type="module" src="./project-queries.js"></script>
</head>
<body>

<h2>Login</h2>
<input id="email" type="email" placeholder="email" />
<input id="password" type="password" placeholder="wachtwoord" />
<button onclick="login()">Inloggen</button>
<button onclick="logout()">Uitloggen</button>
<p id="auth-status">Niet ingelogd</p>

<hr />

<h2>Project toevoegen</h2>
<input id="title" placeholder="Titel" />
<textarea id="description" placeholder="Beschrijving"></textarea>
<input id="images" type="file" multiple accept="image/*" />
<button onclick="addProject()">Toevoegen</button>

<hr />

<h2>Projecten</h2>
<button onclick="loadProjects()">Laad projecten</button>
<div id="projects"></div>

</body>
</html>
