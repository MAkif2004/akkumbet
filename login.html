    <section class="login-section">
        <div class="login-container">
            <div class="login-fields-container">
                <h2>Login</h2>

                <form id="login-form" aria-label="Login form" novalidate>
                    <input id="email" name="email" type="email" placeholder="email" required />
                    <input id="password" name="password" type="password" placeholder="wachtwoord" required />
                    <button type="submit">Inloggen</button>
                    <p id="auth-status" role="status" aria-live="polite"></p>
                </form>

            </div>
        </div>
    </section>

    <script type="module">
        import { db } from './database/connection.js';
        import { showToast, showError } from './src/ui-notifications.js';

        const form = document.getElementById('login-form');
        const statusEl = document.getElementById('auth-status');

        if (form) {
            form.addEventListener('submit', async (e) => {
                e.preventDefault();

                statusEl.textContent = 'Bezig met inloggen...';

                const formData = new FormData(form);
                const email = (formData.get('email') || '').toString().trim();
                const password = (formData.get('password') || '').toString();

                if (!email || !password) {
                    statusEl.textContent = 'Vul e-mail en wachtwoord in.';
                    showToast('Vul e-mail en wachtwoord in.', 'warning');
                    return;
                }

                try {
                    const { data, error } = await db.auth.signInWithPassword({
                        email,
                        password,
                    });

                    if (error) {
                        // Friendly user message + developer-facing log via showError
                        statusEl.textContent = 'Inloggen mislukt.';
                        showError(error, 'Fout bij inloggen.');
                        return;
                    }

                    statusEl.textContent = 'Ingelogd. doorsturen...';
                    showToast('Ingelogd, even geduld...', 'success');
                    // The global auth state handler will redirect the user when a session exists
                } catch (err) {
                    statusEl.textContent = 'Onverwachte fout bij inloggen.';
                    showError(err, 'Onverwachte fout bij inloggen.');
                }
            });
        }
    </script>
</body>
