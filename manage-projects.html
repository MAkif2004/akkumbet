<script type="module">
    window.isLoggedIn = false;
    import { db } from './database/connection.js';
    db.auth.onAuthStateChange((event, session) => {
        console.log(event, session);
        window.isLoggedIn = (event !== 'SIGNED_OUT');
        window.dispatchEvent(new CustomEvent('auth-changed', { detail: { event, session } }));
        if (event === 'SIGNED_OUT') {
            window.location.href = '/login.html';
        }
    });
</script>

<main class="manage-container">
    <section class="manage-section">
        <h1>Beheer Projecten</h1>

        <button id="add-project-btn" class="btn btn-primary">
            <i class="fas fa-plus"></i> Nieuw Project
        </button>

        <div id="projects-list" class="projects-list">
            <p>Projecten laden...</p>
        </div>
    </section>
</main>

<!-- Add/Edit Project Modal -->
<div id="project-modal" class="modal hidden">
    <div class="modal-content">
        <div class="modal-header">
            <h2 id="modal-title">Nieuw Project</h2>
            <button class="close-btn" id="close-modal">&times;</button>
        </div>
        <form id="project-form">
            <div class="form-group">
                <label for="project-title">Titel:</label>
                <input type="text" id="project-title" name="title" required/>
            </div>

            <div class="form-group">
                <label for="project-description">Beschrijving:</label>
                <textarea id="project-description" name="description" rows="5"></textarea>
            </div>

            <div class="form-group">
                <label for="project-images">Afbeeldingen:</label>
                <input type="file" id="project-images" name="images" multiple accept="image/*"/>
                <div id="current-images" class="current-images"></div>
            </div>

            <div class="form-actions">
                <button type="submit" class="btn btn-primary">Opslaan</button>
                <button type="button" class="btn btn-secondary" id="cancel-btn">Annuleren</button>
            </div>
        </form>
    </div>
</div>
